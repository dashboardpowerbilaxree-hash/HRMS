name: DB Sync & Seed

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  db-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma Build Script
        run: node prisma-build.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Push Prisma schema to Neon
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Wait for Vercel deployment
        run: |
          echo "Waiting 60s for Vercel auto-deployment to complete..."
          sleep 60

      - name: Seed Database
        run: |
          curl -X POST "https://hrms-jet-nine.vercel.app/api/seed" || true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
