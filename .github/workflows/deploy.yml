name: DB Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  db-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma Build Script
        run: node prisma-build.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Push Prisma schema to Neon (non-destructive)
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # NOTE: Seed step intentionally REMOVED.
      # The seed endpoint wipes ALL data (attendance, payroll, etc.) and re-creates from a fixed list.
      # Running it on every push destroys user data.
      # To seed a fresh database, manually run: curl -X POST "https://laxree-hrms.vercel.app/api/seed?force=true"
      # This is a ONE-TIME operation only for a brand-new empty database.
